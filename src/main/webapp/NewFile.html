<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Student Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f4f4; 
}

.login-box{
    width:350px;
    margin:100px auto;
    padding:30px;
    background:white;
    box-shadow:0px 0px 10px gray;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="login-box">

<h2 align="center">Aptitude Portal Login</h2>

<form action="./Login.jsp" method="post">

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required>

    <button type="submit">Login</button>

</form>

</div>

</body>
</html>
